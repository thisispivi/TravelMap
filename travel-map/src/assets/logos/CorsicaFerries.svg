<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Corsica Ferries: yellow/orange background, Moor's head (Corsica symbol) + ferry -->
  <rect width="40" height="40" rx="6" fill="#F5A800"/>
  <!-- Corsica Ferries uses the Moor's head (testa di moro) from Corsica's flag -->
  <!-- Stylized Moor's head silhouette (traditional Corsican symbol) -->
  <!-- Head outline -->
  <circle cx="20" cy="14" r="7" fill="#1A1A1A"/>
  <!-- White headband (bandeau) -->
  <path d="M13.2,13.5 Q20,10.5 26.8,13.5 Q27,15 26.8,15.5 Q20,12.5 13.2,15.5 Q13,14.5 13.2,13.5 Z" fill="white"/>
  <!-- Face features suggesting the traditional profile -->
  <!-- Eye highlight -->
  <circle cx="17.5" cy="16" r="1" fill="white" opacity="0.8"/>
  <!-- Ferry silhouette below -->
  <!-- Ship hull -->
  <path d="M6,30 Q8,27 32,27 Q34,27 34,30 Q20,32 6,30 Z" fill="white"/>
  <!-- Superstructure -->
  <rect x="12" y="24" width="16" height="3" rx="1" fill="white"/>
  <rect x="16" y="22" width="8" height="2.5" rx="0.5" fill="white"/>
  <!-- Funnel -->
  <rect x="19" y="20" width="3" height="3" rx="0.5" fill="#1A1A1A"/>
  <!-- Wake/water line -->
  <path d="M5,31 Q12,33 20,31 Q28,29 35,31" stroke="#F5A800" stroke-width="1.5" fill="none" opacity="0.5"/>
</svg>
