<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Tirrenia: dark blue background, white ship with red/white striped funnel -->
  <rect width="40" height="40" rx="6" fill="#003082"/>
  <!-- Ship hull -->
  <path d="M4,28 L5,25 L35,25 L36,28 Q20,32 4,28 Z" fill="white"/>
  <!-- Superstructure decks -->
  <rect x="8" y="21" width="24" height="4" rx="0.5" fill="white"/>
  <rect x="11" y="18" width="18" height="3.5" rx="0.5" fill="white"/>
  <rect x="14" y="15.5" width="12" height="3" rx="0.5" fill="white"/>
  <!-- Two funnels -->
  <!-- Funnel 1 -->
  <rect x="16" y="12" width="4" height="4" rx="0.5" fill="#003082"/>
  <rect x="16" y="12" width="4" height="1.5" rx="0.5" fill="#CC0000"/>
  <rect x="16" y="13.5" width="4" height="1" fill="white"/>
  <rect x="16" y="14.5" width="4" height="1.5" fill="#003082"/>
  <!-- Funnel 2 -->
  <rect x="22" y="12" width="4" height="4" rx="0.5" fill="#003082"/>
  <rect x="22" y="12" width="4" height="1.5" rx="0.5" fill="#CC0000"/>
  <rect x="22" y="13.5" width="4" height="1" fill="white"/>
  <rect x="22" y="14.5" width="4" height="1.5" fill="#003082"/>
  <!-- Bow (front pointed shape) -->
  <path d="M35,25 Q38,26 36,28" fill="white"/>
  <!-- Wave line at waterline -->
  <path d="M4,29.5 Q12,31 20,29.5 Q28,28 36,29.5" stroke="#6FA8DC" stroke-width="1" fill="none" opacity="0.6"/>
</svg>
