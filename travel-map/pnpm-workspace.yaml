allowBuilds:
  "@parcel/watcher": true
  msgpackr-extract: true

ignoredBuiltDependencies:
  - esbuild

blockExoticSubdeps: true

minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - "@types/node"
  - "@typescript-eslint/eslint-plugin"
  - "@typescript-eslint/parser"
  - "@typescript-eslint/project-service"
  - "@typescript-eslint/scope-manager"
  - "@typescript-eslint/tsconfig-utils"
  - "@typescript-eslint/type-utils"
  - "@typescript-eslint/types"
  - "@typescript-eslint/typescript-estree"
  - "@typescript-eslint/utils"
  - "@typescript-eslint/visitor-keys"
  - apexcharts
  - deslop-js
  - eslint
  - fast-uri@3.1.4
  - fast-uri@4.1.1
  - knip
  - oxlint-plugin-react-doctor
  - prettier
  - react-doctor
  - react-router
  - react-router-dom
  - remeda
  - sass
  - lint-staged@17.0.8
  - react-apexcharts@2.1.1
  - react-tooltip@6.0.8
  - vite@8.1.3

onlyBuiltDependencies:
  - "@parcel/watcher"

trustPolicy: no-downgrade
trustPolicyExclude:
  - semver@6.3.1

overrides:
  brace-expansion@<1.1.16: ">=1.1.16 <2.0.0"
  brace-expansion@>=2.0.0 <2.1.2: ">=2.1.2 <3.0.0"
  brace-expansion@>=3.0.0 <5.0.7: ">=5.0.7"
  d3-color@<3.1.0: ">=3.1.0"
  fast-uri@>=3.0.0 <3.1.4: ">=3.1.4 <4.0.0"
  fast-uri@>=4.0.0 <4.1.1: ">=4.1.1"
  immutable@>=5.0.0-beta.1 <5.1.8: ">=5.1.8"
  js-yaml@>=4.0.0 <4.3.0: ">=4.3.0"
  depcheck>js-yaml: ">=4.3.0" # depcheck pins vulnerable js-yaml 3.x; force patched 4.x
  react-dom@<19.0.0: ">=19.0.0"
  react@<19.0.0: ">=19.0.0"
